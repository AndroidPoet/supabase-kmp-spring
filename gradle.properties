# Metro's Gradle plugin requires the Gradle JVM to be Java 21+. If your default
# `java` is older, either run with JAVA_HOME pointing at a JDK 21, or uncomment
# and point the line below at a local JDK 21 install:
# org.gradle.java.home=/path/to/jdk-21

org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
org.gradle.caching=true
kotlin.code.style=official
